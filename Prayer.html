<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="Images/islamic.png">
    <title>مواقيت الصلاة في الجزائر</title>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="relative min-h-screen">
    <!-- Image en arrière-plan -->
    <div class="relative">
        <img src="Images/bbb.jpg" class="w-full h-screen object-cover">

        <!-- Barre de navigation superposée -->
        <nav class="absolute top-0 left-0 w-full bg-white/70 backdrop-blur-lg shadow-sm py-4 px-8 flex justify-between items-center h-32 md:h-44 z-40 transition-all">
            <div class="logo">
                <img src="Images/Capture.PNG" class="w-24 h-24">
            </div>
            
            <!-- Menu Desktop -->
            <ul class="hidden md:flex gap-8 text-lg font-semibold uppercase">
                <a href="index.html"><li class="relative cursor-pointer text-gray-700">Home</li></a>
                <a href="Prayer.html"><li class="relative cursor-pointer text-black hover:text-black transition duration-300 underline">Prayer Time</li></a>
                <a href="contact.html"><li class="relative cursor-pointer text-gray-700 hover:text-black transition duration-300">Contact</li></a>
            </ul>

            <!-- Menu Burger (Mobile) -->
            <div class="md:hidden">
                <button id="menu-toggle">
                    <img src="Images/menu (1).png" class="w-8 h-8">
                </button>
            </div>
        </nav>

        <!-- Menu mobile (caché par défaut) -->
        <div id="mobile-menu" class="hidden absolute top-16 right-0 bg-white w-48 py-4 shadow-lg rounded-lg text-center z-50">
            <ul class="flex flex-col gap-4 text-lg font-semibold uppercase">
                <a href="index.html"><li class="cursor-pointer text-gray-700 hover:text-black transition duration-300">Home</li></a>
                <a href="Prayer.html"><li class="cursor-pointer text-gray-700 hover:text-black transition duration-300">Prayer Time</li></a>
                <a href="contact.html"><li class="cursor-pointer text-gray-700 hover:text-black transition duration-300">Contact</li></a>
            </ul>
        </div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-[90%] md:w-auto">
            <h1 class="text-white text-4xl md:text-6xl font-bold drop-shadow-2xl">Prayer Times</h1>
            <p class="text-white text-lg md:text-xl mt-6 drop-shadow-xl font-light">Découvrez les horaires de prière et bien plus encore</p>
            <div class="flex mt-8 max-w-lg mx-auto">
                <input type="search" id="city-search" name="city" placeholder="Search a city in Algeria..." 
                    class="p-4 pl-6 border border-emerald-200 bg-white/90 backdrop-blur-sm rounded-full focus:ring-2 focus:ring-emerald-500 focus:outline-none text-emerald-900 shadow-lg w-full transition-all" aria-label="Search for a city">
                <button id="search-btn" class="ml-3 p-4 bg-emerald-600 rounded-full hover:bg-emerald-700 shadow-lg hover:shadow-emerald-500/50 hover:-translate-y-1 transition-all shrink-0">
                    <img src="Images/search.png" alt="Search" class="w-6 h-6">
                </button>
            </div>
            

        </div>
    </div>
        <!--Times-->
        <div class="relative min-h-[16rem] p-4 md:p-16 bg-emerald-900" >
            <div class="max-w-4xl mx-auto bg-white/10 backdrop-blur-md border border-white/20 p-8 md:p-12 rounded-3xl shadow-2xl">
                <h2 id="date-display" class="text-center text-amber-300 text-xl md:text-2xl font-semibold mb-8 tracking-wide"></h2>
                <div class="grid grid-cols-2 text-center text-white text-xl md:text-3xl font-bold max-w-2xl mx-auto uppercase tracking-wider">
                    <h1>Prayer</h1>
                    <h1>Time</h1>
                </div>
                <hr class="border border-white/30 my-6 max-w-2xl mx-auto">
                <div class="grid grid-cols-2 gap-y-6 text-center text-white text-lg md:text-2xl font-light max-w-2xl mx-auto" id="city">
                    <!-- Data will be populated here -->
                </div>
            </div>
        </div>
 <!-- Footer -->
<div class="footer min-h-[16rem] bg-slate-900 flex flex-col md:flex-row justify-around items-center py-12 gap-8 text-slate-300 border-t border-slate-800">
    <!-- Section Image + Texte -->
    <div class="img flex flex-col items-center max-w-xs">
        <div class="bg-white p-3 rounded-full shadow-lg mb-4">
            <img src="Images/shalat.png" class="w-16 h-16 md:w-20 md:h-20 opacity-90">
        </div>
        <p class="text-center text-sm md:text-base font-light text-slate-400">Praying at its time is better than life and everything in it</p>
    </div>

    <!-- Texte des droits d'auteur -->
    <div class="right text-lg md:text-xl text-center font-medium">
        <p>&copy; 2026 Tous droits réservés</p>
    </div>

    <!-- Icônes des réseaux sociaux -->
    <div class="icon flex gap-x-6">
        <!-- Facebook -->
        <a href="#" target="_blank" class="bg-white/10 p-3 rounded-full hover:bg-[#1877F2] transition-all transform hover:-translate-y-1 hover:shadow-lg">
            <img src="Images/facebook-app-symbol.png" class="w-6 h-6 brightness-0 invert">
        </a>
        
        <!-- Twitter -->
        <a href="#" target="_blank" class="bg-white/10 p-3 rounded-full hover:bg-[#1DA1F2] transition-all transform hover:-translate-y-1 hover:shadow-lg">
            <img src="Images/twitter.png" class="w-6 h-6 brightness-0 invert">
        </a>
        
        <!-- Instagram -->
        <a href="#" target="_blank" class="bg-white/10 p-3 rounded-full hover:bg-gradient-to-tr from-[#feda75] via-[#d62976] to-[#4f5bd5] transition-all transform hover:-translate-y-1 hover:shadow-lg">
            <img src="Images/instagram.png" class="w-6 h-6 brightness-0 invert">
        </a>
    </div>
    
</div>        
        
<script>
    const searchBtn = document.getElementById("search-btn");
    const cityInput = document.getElementById("city-search");
    const timesContainer = document.getElementById("city");
    const dateDisplay = document.getElementById("date-display");

    function fetchPrayerTimes(city) {
        // Build URL for Algeria, dynamically taking the city
        const url = `https://api.aladhan.com/v1/timingsByAddress?address=${encodeURIComponent(city + ', Algeria')}`;
        
        timesContainer.innerHTML = '<h1 class="col-span-2">Chargement...</h1>';
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if(data.code !== 200) {
                    timesContainer.innerHTML = '<h1 class="col-span-2 text-red-500">Erreur lors de la récupération des données.</h1>';
                    return;
                }
                
                const timings = data.data.timings;
                const dateInfo = data.data.date;
                
                dateDisplay.innerText = `Date: ${dateInfo.readable} | ${dateInfo.hijri.day} ${dateInfo.hijri.month.ar} ${dateInfo.hijri.year}`;
                
                // Prayers we want to show
                const prayers = [
                    { name: "Fajr (الفجر)", key: "Fajr" },
                    { name: "Sunrise (الشروق)", key: "Sunrise" },
                    { name: "Dhuhr (الظهر)", key: "Dhuhr" },
                    { name: "Asr (العصر)", key: "Asr" },
                    { name: "Maghrib (المغرب)", key: "Maghrib" },
                    { name: "Isha (العشاء)", key: "Isha" }
                ];
                
                timesContainer.innerHTML = '';
                
                prayers.forEach(prayer => {
                    const nameEl = document.createElement("h1");
                    nameEl.className = "font-semibold";
                    nameEl.innerText = prayer.name;
                    
                    const timeEl = document.createElement("h1");
                    timeEl.innerText = timings[prayer.key];
                    
                    timesContainer.appendChild(nameEl);
                    timesContainer.appendChild(timeEl);
                });
            })
            .catch(error => {
                console.error("Error fetching prayer times:", error);
                timesContainer.innerHTML = '<h1 class="col-span-2 text-red-500">Erreur de connexion API.</h1>';
            });
    }

    // Default fetch for Algiers
    fetchPrayerTimes("Algiers");

    // Search button click
    searchBtn.addEventListener("click", () => {
        const city = cityInput.value.trim();
        if (city) {
            fetchPrayerTimes(city);
        }
    });

    // Press Enter to search
    cityInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            const city = cityInput.value.trim();
            if (city) {
                fetchPrayerTimes(city);
            }
        }
    });
</script>
        

</body>
</html>
